spring.config.import=optional:file:./.env[.properties]

spring.application.name=EvalAI
server.port=8081

#Database configurations
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.url=${DATABASE_URL}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

# File Storage â base path for all uploads
app.upload.base-path=../upload

# File Upload Limits — increased for answer sheet PDFs
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

# Python FastAPI service URL — faculty model answer embedding calls
app.python.base-url=http://localhost:8000

# C++ gRPC service
app.grpc.host=localhost
app.grpc.port=50051

# Pipeline settings
app.pipeline.skip-cpp=false

