syntax = "proto3";

package preprocessing;

option java_package = "com.evalai.grpc";
option java_outer_classname = "PreprocessingProto";
option java_multiple_files = true;

/*-----------------------------------------------------------
							 SERVICE
-----------------------------------------------------------*/ 

service PreprocessingService {

  // Preprocesses all raw page images for one student's answer sheet
  // Java sends raw images → C++ returns cleaned images
  rpc PreprocessStudentImages (PreprocessRequest) returns (PreprocessResponse);

  // Health check — Java calls this to verify C++ service is running
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
}

/*-----------------------------------------------------------
							 REQUEST MESSAGES
-----------------------------------------------------------*/

message PreprocessRequest {
  string task_id = 1;           // UUID generated by Java for this job
  string exam_id = 2;           // exam identifier
  string student_id = 3;        // student identifier
  string answer_sheet_id = 4;   // answer sheet identifier
  repeated RawImagePage pages = 5; // all raw page images
  string output_base_path = 6;  // base path for cleaned image output
}

message RawImagePage {
  int32 page_number = 1;        // page number (1-indexed)
  string image_path = 2;        // full path to raw PNG image
}

/*-----------------------------------------------------------
						RESPONSE MESSAGES
-----------------------------------------------------------*/

message PreprocessResponse {
  string task_id = 1;                    // echoed back from request
  PreprocessStatus status = 2;           // overall status
  repeated CleanedImagePage pages = 3;   // one entry per input page
  string error_message = 4;             // populated if status is FAILED
}

message CleanedImagePage {
  int32 page_number = 1;       // matches input page number
  string raw_path = 2;         // original raw image path
  string cleaned_path = 3;     // output cleaned image path
  PageStatus status = 4;       // per-page processing status
  float skew_angle = 5;        // detected skew angle in degrees
  bool anonymized = 6;         // true if student ID was masked
  string error_message = 7;    // populated if page status is FAILED
}

message HealthCheckRequest {
  string service = 1;          // "evalai-cpp"
}

message HealthCheckResponse {
  string status = 1;           // "HEALTHY" or "UNHEALTHY"
  string version = 2;          // service version
  string message = 3;          // additional info
}

/*-----------------------------------------------------------
						ENUMS
-----------------------------------------------------------*/

enum PreprocessStatus {
  PREPROCESS_STATUS_UNKNOWN = 0;
  PREPROCESS_STATUS_COMPLETED = 1;
  PREPROCESS_STATUS_COMPLETED_WITH_FAILURES = 2;
  PREPROCESS_STATUS_FAILED = 3;
}

enum PageStatus {
  PAGE_STATUS_UNKNOWN = 0;
  PAGE_STATUS_SUCCESS = 1;
  PAGE_STATUS_FAILED = 2;
}